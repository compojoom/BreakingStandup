<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF1744"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D50000"/>
      <stop offset="50%" stop-color="#FF1744"/>
      <stop offset="100%" stop-color="#D50000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedRect">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedRect)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Subtle grid pattern -->
    <g opacity="0.06" stroke="#fff" stroke-width="1">
      <line x1="0" y1="256" x2="1024" y2="256"/>
      <line x1="0" y1="512" x2="1024" y2="512"/>
      <line x1="0" y1="768" x2="1024" y2="768"/>
      <line x1="256" y1="0" x2="256" y2="1024"/>
      <line x1="512" y1="0" x2="512" y2="1024"/>
      <line x1="768" y1="0" x2="768" y2="1024"/>
    </g>

    <!-- Broadcast signal rings behind mic -->
    <g filter="url(#softGlow)" opacity="0.15">
      <circle cx="512" cy="380" r="260" fill="none" stroke="#FF1744" stroke-width="3"/>
      <circle cx="512" cy="380" r="320" fill="none" stroke="#FF1744" stroke-width="2"/>
      <circle cx="512" cy="380" r="380" fill="none" stroke="#FF1744" stroke-width="1.5"/>
    </g>

    <!-- Signal arcs - left -->
    <g filter="url(#glow)" opacity="0.5">
      <path d="M310 280 A220 220 0 0 1 310 480" fill="none" stroke="#FF1744" stroke-width="6" stroke-linecap="round"/>
      <path d="M260 240 A280 280 0 0 1 260 520" fill="none" stroke="#FF1744" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
      <path d="M215 200 A340 340 0 0 1 215 560" fill="none" stroke="#FF1744" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
    </g>

    <!-- Signal arcs - right -->
    <g filter="url(#glow)" opacity="0.5">
      <path d="M714 280 A220 220 0 0 0 714 480" fill="none" stroke="#FF1744" stroke-width="6" stroke-linecap="round"/>
      <path d="M764 240 A280 280 0 0 0 764 520" fill="none" stroke="#FF1744" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
      <path d="M809 200 A340 340 0 0 0 809 560" fill="none" stroke="#FF1744" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
    </g>

    <!-- Microphone body -->
    <rect x="472" y="260" width="80" height="180" rx="40" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="2"/>
    <!-- Mic grille lines -->
    <g stroke="#B0BEC5" stroke-width="1.5" opacity="0.5">
      <line x1="486" y1="290" x2="538" y2="290"/>
      <line x1="486" y1="310" x2="538" y2="310"/>
      <line x1="486" y1="330" x2="538" y2="330"/>
      <line x1="486" y1="350" x2="538" y2="350"/>
      <line x1="486" y1="370" x2="538" y2="370"/>
      <line x1="486" y1="390" x2="538" y2="390"/>
    </g>
    <!-- Mic highlight -->
    <rect x="488" y="270" width="18" height="150" rx="9" fill="#fff" opacity="0.15"/>

    <!-- Mic stand -->
    <rect x="504" y="440" width="16" height="80" fill="#90A4AE"/>
    <rect x="464" y="510" width="96" height="12" rx="6" fill="#78909C"/>

    <!-- ON AIR dot -->
    <circle cx="512" cy="195" r="18" fill="#FF1744" filter="url(#glow)"/>
    <circle cx="512" cy="195" r="9" fill="#fff" opacity="0.7"/>

    <!-- Red banner bar -->
    <rect x="60" y="610" width="904" height="90" rx="6" fill="url(#barGrad)" filter="url(#glow)"/>

    <!-- BREAKING STANDUP text -->
    <text x="512" y="670" text-anchor="middle" font-family="'Helvetica Neue', 'Arial Black', Helvetica, sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" letter-spacing="6">BREAKING STANDUP</text>

    <!-- Thin accent lines above and below banner -->
    <rect x="60" y="604" width="904" height="4" fill="#FFD600"/>
    <rect x="60" y="702" width="904" height="4" fill="#FFD600"/>

    <!-- Bottom ticker line -->
    <rect x="100" y="760" width="824" height="3" rx="1.5" fill="#FF1744" opacity="0.4"/>
    <rect x="200" y="790" width="624" height="2" rx="1" fill="#FF1744" opacity="0.2"/>

    <!-- Corner accents -->
    <g stroke="#FF1744" stroke-width="3" opacity="0.3">
      <polyline points="80,120 80,80 120,80" fill="none"/>
      <polyline points="944,120 944,80 904,80" fill="none"/>
      <polyline points="80,904 80,944 120,944" fill="none"/>
      <polyline points="944,904 944,944 904,944" fill="none"/>
    </g>
  </g>
</svg>
